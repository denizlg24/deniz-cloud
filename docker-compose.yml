networks:
  internal:
    name: denizcloud_internal
    driver: bridge

services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    networks: [internal]
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-denizcloud}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
      - ./scripts/infra/postgres-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-50}
      -c idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TRANSACTION_TIMEOUT:-60s}
    mem_limit: 200m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-denizcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    container_name: mongodb
    image: ${MONGO_IMAGE:-mongo:8.2.11}
    networks: [internal]
    ports:
      - "${MONGO_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_SYNC_USER: ${MONGO_SYNC_USER:-sync_reader}
      MONGO_SYNC_PASSWORD: ${MONGO_SYNC_PASSWORD:-${MONGO_INITDB_ROOT_PASSWORD}}
      MONGO_SEARCH_ENABLED: ${MONGO_SEARCH_ENABLED:-true}
      MONGO_WIREDTIGER_CACHE_GB: ${MONGO_WIREDTIGER_CACHE_GB:-0.5}
    volumes:
      - ${MONGO_DATA_DIR:-./data/mongo}:/data/db
      - ./config/mongo/replica-keyfile:/etc/mongo/replica-keyfile:ro
      - ./scripts/infra/mongodb-entrypoint.sh:/usr/local/bin/deniz-mongodb-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/deniz-mongodb-entrypoint.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test \"$$(cat /proc/1/comm)\" = mongod && mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"quit(db.adminCommand({ ping: 1 }).ok === 1 ? 0 : 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mongo-init:
    image: ${MONGO_IMAGE:-mongo:8.2.11}
    networks: [internal]
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "/usr/local/bin/mongo-rs-init.sh"]
    environment:
      MONGO_USER: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_PASS: ${MONGO_INITDB_ROOT_PASSWORD}
      SYNC_USER: ${MONGO_SYNC_USER:-sync_reader}
      SYNC_PASS: ${MONGO_SYNC_PASSWORD:-${MONGO_INITDB_ROOT_PASSWORD}}
      SEARCH_USER: mongot_search
      SEARCH_PASS: ${MONGOT_PASSWORD:-${MONGO_INITDB_ROOT_PASSWORD}}
    volumes:
      - ./scripts/infra/mongo-rs-init.sh:/usr/local/bin/mongo-rs-init.sh:ro
      - mongot-secrets:/run/mongot-secrets

  mongot:
    container_name: mongot
    image: ${MONGOT_IMAGE:-mongodb/mongodb-community-search:1.70.1}
    networks: [internal]
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGOT_JVM_FLAGS: ${MONGOT_JVM_FLAGS:-}
    volumes:
      - ./scripts/infra/mongot.yml:/mongot-community/config.default.yml:ro
      - mongot-secrets:/etc/mongot/secrets:ro
      - ${MONGOT_DATA_DIR:-./data/mongot}:/data/mongot
    entrypoint: ["/bin/bash", "-c", "if [[ -n \"$${MONGOT_JVM_FLAGS}\" ]]; then exec /mongot-community/mongot --config /mongot-community/config.default.yml --jvm-flags \"$${MONGOT_JVM_FLAGS}\"; else exec /mongot-community/mongot --config /mongot-community/config.default.yml; fi"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://mongot:8080/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  meilisearch:
    container_name: meilisearch
    image: getmeili/meilisearch:v1.38
    networks: [internal]
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ${MEILI_DATA_DIR:-./data/meilisearch}:/meili_data
    restart: unless-stopped
    healthcheck:
      disable: true

  redis:
    container_name: redis
    image: redis:7-alpine
    networks: [internal]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-128mb}
    entrypoint: ["sh", "/usr/local/bin/redis-acl-entrypoint.sh"]
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
      - ./scripts/infra/redis-acl-entrypoint.sh:/usr/local/bin/redis-acl-entrypoint.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    networks: [internal]
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 100m
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    networks: [internal]
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_SITE_BASEURL: /tools/mongo-ui
    depends_on:
      mongodb:
        condition: service_healthy
    mem_limit: 80m
    restart: unless-stopped

  storage:
    build:
      context: .
      dockerfile: packages/storage-api/Dockerfile
    networks: [internal]
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-denizcloud}
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      JWT_SECRET: ${JWT_SECRET}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      SSD_STORAGE_PATH: /data/ssd
      HDD_STORAGE_PATH: /data/hdd
      SSD_WATERMARK_PERCENT: ${SSD_WATERMARK_PERCENT:-90}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_ADMIN_KEY: ${MEILI_MASTER_KEY}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-eu-west-1}
      S3_ROOT_PATH: ${S3_ROOT_PATH:-/data/ssd/.s3-v2}
      S3_TEMP_PATH: ${S3_TEMP_PATH:-/data/ssd/.s3-v2-temp}
    volumes:
      - ${SSD_STORAGE_PATH:-./data/storage/ssd}:/data/ssd
      - ${HDD_STORAGE_PATH:-./data/storage/hdd}:/data/hdd
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 300m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: packages/admin-api/Dockerfile
    networks: [internal]
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-denizcloud}
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      JWT_SECRET: ${JWT_SECRET}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MONGODB_URI: mongodb://${MONGO_SYNC_USER:-sync_reader}:${MONGO_SYNC_PASSWORD:-${MONGO_INITDB_ROOT_PASSWORD}}@mongodb:27017/?authSource=admin&directConnection=true
      MONGODB_ADMIN_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin&directConnection=true
      MONGOT_HEALTH_URL: http://mongot:8080
      MONGOT_MAX_INDEXES_PER_PROJECT: ${MONGOT_MAX_INDEXES_PER_PROJECT:-5}
      REDIS_ADMIN_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      REDIS_INTERNAL_HOST: redis:6379
      REDIS_EXTERNAL_HOST: redis.denizlg24.com:6380
      TERMINAL_SERVER_URL: ws://terminal-server:3003
      BACKUP_DIR: /backups
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      DOCKER_HOST: unix:///var/run/docker.sock
      SSD_DEVICE: ${SSD_DEVICE:-/dev/nvme0n1p1}
      HDD_DEVICES: ${HDD_DEVICES:-}
      MICROSD_DEVICE: ${MICROSD_DEVICE:-/dev/mmcblk0p2}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://storage.denizlg24.com/v2}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-eu-west-1}
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # Exposes the SD card's root filesystem to df for MICROSD_DEVICE stats.
      # Docker's data-root lives on the NVMe, so without this no SD card
      # filesystem is visible inside the container and it reports as offline.
      - /:/host/rootfs:ro
      - ${SSD_MOUNT_PATH:-/mnt/ssd}:/mnt/ssd:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BACKUP_DIR:-./data/backups}:/backups
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    mem_limit: 250m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3002/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  terminal-server:
    build:
      context: .
      dockerfile: packages/terminal-server/Dockerfile
    networks: [internal]
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
    pid: host
    privileged: true
    mem_limit: 64m
    restart: unless-stopped

volumes:
  mongot-secrets:
