services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-denizcloud}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
      - ./scripts/infra/postgres-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c max_connections=50
    mem_limit: 200m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-denizcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_SYNC_USER: ${MONGO_SYNC_USER:-sync_reader}
      MONGO_SYNC_PASSWORD: ${MONGO_SYNC_PASSWORD:-${MONGO_INITDB_ROOT_PASSWORD}}
    volumes:
      - ${MONGO_DATA_DIR:-./data/mongo}:/data/db
      - ./config/mongo/replica-keyfile:/data/replica-keyfile:ro
    entrypoint: ["/bin/bash", "-c", "cp /data/replica-keyfile /tmp/replica-keyfile && chmod 400 /tmp/replica-keyfile && chown 999:999 /tmp/replica-keyfile && exec docker-entrypoint.sh mongod --wiredTigerCacheSizeGB 0.25 --replSet rs0 --keyFile /tmp/replica-keyfile"]
    mem_limit: 400m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status().ok } catch(e) { db.adminCommand('ping').ok }", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "[mongo-init] Checking replica set..."
        if mongosh "mongodb://$${MONGO_USER}:$${MONGO_PASS}@mongodb:27017/?authSource=admin" --eval "rs.status().ok" --quiet 2>/dev/null; then
          echo "[mongo-init] Replica set already initialized"
        else
          echo "[mongo-init] Initiating replica set..."
          mongosh "mongodb://$${MONGO_USER}:$${MONGO_PASS}@mongodb:27017/?authSource=admin&directConnection=true" --eval '
            rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] });
          '
          echo "[mongo-init] Waiting for primary..."
          sleep 5
        fi

        echo "[mongo-init] Ensuring sync user exists..."
        mongosh "mongodb://$${MONGO_USER}:$${MONGO_PASS}@mongodb:27017/?authSource=admin&directConnection=true" --eval "
          const u = db.getSiblingDB('admin').getUser('$${SYNC_USER}');
          if (!u) {
            db.getSiblingDB('admin').createUser({
              user: '$${SYNC_USER}',
              pwd: '$${SYNC_PASS}',
              roles: [{ role: 'readAnyDatabase', db: 'admin' }]
            });
            print('[mongo-init] Sync user created');
          } else {
            print('[mongo-init] Sync user already exists');
          }
        "
        echo "[mongo-init] Done"
    environment:
      MONGO_USER: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_PASS: ${MONGO_INITDB_ROOT_PASSWORD}
      SYNC_USER: ${MONGO_SYNC_USER:-sync_reader}
      SYNC_PASS: ${MONGO_SYNC_PASSWORD:-${MONGO_INITDB_ROOT_PASSWORD}}

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ${MEILI_DATA_DIR:-./data/meilisearch}:/meili_data
    mem_limit: 256m
    restart: unless-stopped
    healthcheck:
      disable: true

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 100m
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    depends_on:
      mongodb:
        condition: service_healthy
    mem_limit: 80m
    restart: unless-stopped

  storage:
    build:
      context: .
      dockerfile: packages/storage-api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-denizcloud}
      JWT_SECRET: ${JWT_SECRET}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      SSD_STORAGE_PATH: /data/ssd
      HDD_STORAGE_PATH: /data/hdd
      TEMP_UPLOAD_PATH: /tmp/uploads
      SSD_WATERMARK_PERCENT: ${SSD_WATERMARK_PERCENT:-90}
    volumes:
      - ${SSD_STORAGE_PATH:-./data/storage/ssd}:/data/ssd
      - ${HDD_STORAGE_PATH:-./data/storage/hdd}:/data/hdd
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 300m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: packages/admin-api/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-denizcloud}
      JWT_SECRET: ${JWT_SECRET}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MONGODB_URI: mongodb://${MONGO_SYNC_USER:-sync_reader}:${MONGO_SYNC_PASSWORD:-${MONGO_INITDB_ROOT_PASSWORD}}@mongodb:27017/?authSource=admin&directConnection=true
      MONGODB_ADMIN_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin&directConnection=true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ${SSD_MOUNT_PATH:-/mnt/ssd}:/mnt/ssd:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_started
    mem_limit: 250m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3002/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
